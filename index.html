<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康彥琳 (康康）專業名片 V1 </title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <script>
      const ANITA_DATA = {
            LIFF_ID: "2009473853-jpajr4P0",
            BASE_URL: "https://joannahsu0327-maker.github.io/anita-card/",
            IMG_MAIN: "ANITA_IMAGE.jpg",
            IMG_INTRO: "CARE_IMAGE.jpg",
            name: "康彥琳 (康康）",
            title: "人壽保險 | 醫療長照",
            intro: "我一直都在 您的保險顧問",
            
            feature_Title: "服務項目", 
            item1: "👨‍👩‍👧‍👦 家庭保障健檢",
            item2: "📑 跨理賠諮詢服務",
            item3: "⚖️ 意定監護律師團協作諮詢",
            item4: "🏦 銀行業團隊協作諮詢",
            item5: "🏠 地政代書協作諮詢",
            
            url_Booking: "https://line.me/ti/p/6xwM_4j3E0",
            url_IG: "https://www.instagram.com/anita.kang.7",
            url_FB: "https://www.facebook.com/anita.kang.7",
            phone: "0913085558"
        };

async function main() {
            try {
                await liff.init({ liffId: ANITA_DATA.LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const ts = "?t=" + Date.now();
                const res = await liff.shareTargetPicker([{
                    "type": "flex", 
                    "altText": "您好，這是 " + ANITA_DATA.name + " 的專業名片",
                    "contents": {
                        "type": "carousel",
                        "contents": [
                            { 
                                "type": "bubble", 
                                "hero": { "type": "image", "url": ANITA_DATA.BASE_URL + ANITA_DATA.IMG_MAIN + ts, "size": "full", "aspectRatio": "3:4", "aspectMode": "cover" }, 
                                "body": { "type": "box", "layout": "vertical", "contents": [ 
                                    { "type": "text", "text": ANITA_DATA.name, "weight": "bold", "size": "xl" }, 
                                    { "type": "text", "text": ANITA_DATA.title, "size": "sm", "color": "#fb966e", "weight": "bold" } 
                                ] } 
                            },
                            { 
                                "type": "bubble", 
                                "hero": { "type": "image", "url": ANITA_DATA.BASE_URL + ANITA_DATA.IMG_INTRO + ts, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" }, 
                                "body": { "type": "box", "layout": "vertical", "spacing": "lg", "contents": [
                                    { "type": "text", "text": ANITA_DATA.intro, "size": "xs", "color": "#888888", "wrap": true },
                                    { "type": "text", "text": ANITA_DATA.feature_Title, "weight": "bold", "size": "lg", "color": "#fb966e" },
                                    { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                                        { "type": "text", "text": ANITA_DATA.item1, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": ANITA_DATA.item2, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": ANITA_DATA.item3, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": ANITA_DATA.item4, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": ANITA_DATA.item5, "size": "md", "weight": "bold" }
                                    ]}
                                ]},
                                "footer": { "type": "box", "layout": "vertical", "contents": [ 
                                    { "type": "button", "style": "primary", "color": "#fb966e", "action": { "type": "uri", "label": "預約諮詢", "uri": ANITA_DATA.url_Booking } } 
                                ] }
                            },
                            { 
                                "type": "bubble", 
                                "body": { "type": "box", "layout": "vertical", "spacing": "md", "contents": [
                                    { "type": "text", "text": "與我聯繫", "weight": "bold", "size": "lg" }, { "type": "separator" },
                                    { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                                        { "type": "button", "style": "primary", "color": "#fb966e", "action": { "type": "uri", "label": "撥打電話", "uri": "tel:" + ANITA_DATA.phone } },
                                        { "type": "button", "style": "secondary", "color": "#EEEEEE", "action": { "type": "uri", "label": "加 LINE 好友", "uri": ANITA_DATA.url_Booking } },
                                        { "type": "button", "style": "secondary", "color": "#FEE8F0", "action": { "type": "uri", "label": "追蹤 Instagram", "uri": ANITA_DATA.url_IG } },
                                        { "type": "button", "style": "secondary", "color": "#E8F0FE", "action": { "type": "uri", "label": "Facebook", "uri": ANITA_DATA.url_FB } },
                                        { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "📤 分享康康名片", "uri": "https://liff.line.me/" + ANITA_DATA.LIFF_ID } }
                                    ]}
                                ]}
                            }
                        ]
                    }
                }]);

                if (res) {
                    // 分享成功後關閉視窗
                    liff.closeWindow();
                } else {
                    // 使用者取消分享
                    console.log("TargetPicker cancelled");
                }
            } catch (err) { 
                console.error(err);
                alert("啟動失敗，請檢查權限或網址設定");
            }
        }
        main();
    </script>
</body>
</html>
